<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binance Order Book Depth 30%</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📊</text></svg>">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e11;
      color: #eaecef;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #1e2329;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      color: #f0b90b;
    }
    .symbol {
      font-size: 1.2rem;
      color: #848e9c;
      margin-bottom: 20px;
    }
    .table {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 30px;
      margin-top: 10px;
    }
    .metric {
      text-align: left;
    }
    .metric .label {
      font-size: 0.85rem;
      color: #848e9c;
      margin-bottom: 4px;
    }
    .metric .value {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .bid .value { color: #2ebd85; }
    .ask .value { color: #f6465d; }
    .diff .value { color: #eaecef; }
    .status {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #848e9c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ebd85;
      display: inline-block;
    }
    .dot.disconnected { background: #f6465d; }
    .dot.connecting { background: #f0b90b; }
    .error { color: #f6465d; margin-top: 10px; }
    .debug {
      margin-top: 15px;
      font-size: 0.7rem;
      color: #5e6673;
      background: #14181c;
      padding: 10px;
      border-radius: 6px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Order Book Depth</h1>
    <div class="symbol" id="symbolDisplay">BTCUSDT</div>

    <div class="table">
      <div class="metric bid">
        <div class="label">Bid Volume (30% depth)</div>
        <div class="value" id="bidVolume">—</div>
      </div>
      <div class="metric ask">
        <div class="label">Ask Volume (30% depth)</div>
        <div class="value" id="askVolume">—</div>
      </div>
    </div>
    <div class="table" style="margin-top: 0;">
      <div class="metric diff">
        <div class="label">Imbalance (Bid - Ask)</div>
        <div class="value" id="imbalance">—</div>
      </div>
      <div class="metric" style="visibility: hidden;"></div>
    </div>

    <div class="status" id="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Подключение...</span>
    </div>
    <div id="errorMsg" class="error"></div>
    <div id="debugInfo" class="debug"></div>
  </div>

  <script>
    (function() {
      // ---------- НАСТРОЙКИ ----------
      const SYMBOL = 'btcusdt';
      const DEPTH_PERCENT = 30;
      const REST_SNAPSHOT_URL = `https://api.binance.com/api/v3/depth?symbol=${SYMBOL.toUpperCase()}&limit=1000`;
      // Поток мгновенных обновлений (дельта)
      const WS_DEPTH_STREAM = `wss://stream.binance.com:443/ws/${SYMBOL}@depth@100ms`;
      // Поток лучшей цены для мгновенного отображения
      const WS_TICKER_STREAM = `wss://stream.binance.com:443/ws/${SYMBOL}@ticker`;
      // ---------------------------------

      const symbolDisplay = document.getElementById('symbolDisplay');
      const bidVolumeEl = document.getElementById('bidVolume');
      const askVolumeEl = document.getElementById('askVolume');
      const imbalanceEl = document.getElementById('imbalance');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const errorMsg = document.getElementById('errorMsg');
      const debugInfo = document.getElementById('debugInfo');

      symbolDisplay.textContent = SYMBOL.toUpperCase();

      // Текущее состояние стакана
      let currentBids = new Map(); // price -> quantity
      let currentAsks = new Map();
      let lastUpdateId = null;

      function log(msg) {
        const time = new Date().toLocaleTimeString();
        debugInfo.textContent = `[${time}] ${msg}`;
        console.log(msg);
      }

      function formatVolume(vol) {
        if (vol === null || vol === undefined) return '—';
        if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
        if (vol >= 1e3) return (vol / 1e3).toFixed(2) + 'K';
        return vol.toFixed(2);
      }

      function setStatus(state) {
        statusDot.className = 'dot ' + state;
        if (state === 'connecting') {
          statusText.textContent = 'Подключение...';
        } else if (state === 'disconnected') {
          statusText.textContent = 'Отключено';
        } else {
          statusText.textContent = 'Live';
        }
      }

      function showError(text) {
        errorMsg.textContent = text || '';
      }

      // Обновление таблицы на основе данных стакана
      function updateDisplay() {
        if (currentBids.size === 0 || currentAsks.size === 0) return;

        const bestBid = Math.max(...currentBids.keys());
        const bestAsk = Math.min(...currentAsks.keys());

        const bidThreshold = bestBid * (1 - DEPTH_PERCENT / 100);
        const askThreshold = bestAsk * (1 + DEPTH_PERCENT / 100);

        let bidVolume = 0;
        for (const [price, qty] of currentBids) {
          if (price >= bidThreshold && price <= bestBid) {
            bidVolume += qty;
          }
        }

        let askVolume = 0;
        for (const [price, qty] of currentAsks) {
          if (price >= bestAsk && price <= askThreshold) {
            askVolume += qty;
          }
        }

        bidVolumeEl.textContent = formatVolume(bidVolume);
        askVolumeEl.textContent = formatVolume(askVolume);
        const imbalance = bidVolume - askVolume;
        imbalanceEl.textContent = formatVolume(imbalance);
        imbalanceEl.style.color = imbalance > 0 ? '#2ebd85' : (imbalance < 0 ? '#f6465d' : '#eaecef');
      }

      // Получение полного снимка стакана через REST API
      async function fetchSnapshot() {
        try {
          log('Получение снимка стакана через REST API...');
          const response = await fetch(REST_SNAPSHOT_URL);
          const data = await response.json();
          
          if (!data.bids || !data.asks) {
            throw new Error('Некорректный формат снимка');
          }

          lastUpdateId = data.lastUpdateId;
          
          // Очищаем и заполняем стакан
          currentBids.clear();
          currentAsks.clear();
          
          data.bids.forEach(([price, qty]) => {
            currentBids.set(parseFloat(price), parseFloat(qty));
          });
          
          data.asks.forEach(([price, qty]) => {
            currentAsks.set(parseFloat(price), parseFloat(qty));
          });

          updateDisplay();
          setStatus('');
          log('Снимок стакана загружен. LastUpdateId: ' + lastUpdateId);
          showError('');
        } catch (e) {
          showError('Ошибка загрузки снимка: ' + e.message);
          log('Ошибка: ' + e.message);
          // Повторная попытка через 5 секунд
          setTimeout(fetchSnapshot, 5000);
        }
      }

      // Применение дельта-обновлений из WebSocket
      function applyDepthUpdate(data) {
        if (!lastUpdateId) return; // Ещё нет снимка

        const U = data.U; // First update ID
        const u = data.u; // Final update ID
        const b = data.b || []; // Bids updates
        const a = data.a || []; // Asks updates

        // Проверка на синхронизацию
        if (u < lastUpdateId) {
          // Устаревшее обновление, пропускаем
          return;
        }

        if (U > lastUpdateId + 1) {
          // Потеря данных, нужна ресинхронизация
          log('Обнаружена потеря данных. Ресинхронизация...');
          fetchSnapshot();
          return;
        }

        // Применяем обновления
        b.forEach(([price, qty]) => {
          const p = parseFloat(price);
          const q = parseFloat(qty);
          if (q === 0) {
            currentBids.delete(p);
          } else {
            currentBids.set(p, q);
          }
        });

        a.forEach(([price, qty]) => {
          const p = parseFloat(price);
          const q = parseFloat(qty);
          if (q === 0) {
            currentAsks.delete(p);
          } else {
            currentAsks.set(p, q);
          }
        });

        lastUpdateId = u;
        updateDisplay();
      }

      // Инициализация WebSocket соединений
      function initWebSockets() {
        // Поток обновлений стакана (дельта)
        const depthWs = new WebSocket(WS_DEPTH_STREAM);
        
        depthWs.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.e === 'depthUpdate') {
              applyDepthUpdate(msg);
            }
          } catch (e) {
            log('Ошибка обработки depthUpdate: ' + e.message);
          }
        };

        depthWs.onerror = () => {
          log('Ошибка WebSocket depth');
          setStatus('disconnected');
        };

        depthWs.onclose = () => {
          log('Depth WebSocket закрыт. Переподключение...');
          setStatus('disconnected');
          setTimeout(initWebSockets, 3000);
        };

        // Дополнительный поток тикера для мгновенного отображения лучшей цены
        const tickerWs = new WebSocket(WS_TICKER_STREAM);
        
        tickerWs.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.e === '24hrTicker') {
              // Можно использовать для дополнительной информации
              // Например, отображать процент изменения
            }
          } catch (e) {
            // Игнорируем ошибки парсинга тикера
          }
        };
      }

      // Запуск
      fetchSnapshot();
      initWebSockets();
      setStatus('connecting');
    })();
  </script>
</body>
</html>
