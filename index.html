<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binance Order Book Depth 30%</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e11;
      color: #eaecef;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #1e2329;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      color: #f0b90b;
    }
    .symbol {
      font-size: 1.2rem;
      color: #848e9c;
      margin-bottom: 20px;
    }
    .table {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 30px;
      margin-top: 10px;
    }
    .metric {
      text-align: left;
    }
    .metric .label {
      font-size: 0.85rem;
      color: #848e9c;
      margin-bottom: 4px;
    }
    .metric .value {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .bid .value { color: #2ebd85; }
    .ask .value { color: #f6465d; }
    .diff .value { color: #eaecef; }
    .status {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #848e9c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ebd85;
      display: inline-block;
    }
    .dot.disconnected { background: #f6465d; }
    .error { color: #f6465d; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Order Book Depth</h1>
    <div class="symbol" id="symbolDisplay">BTCUSDT</div>

    <div class="table">
      <div class="metric bid">
        <div class="label">Bid Volume (30% depth)</div>
        <div class="value" id="bidVolume">—</div>
      </div>
      <div class="metric ask">
        <div class="label">Ask Volume (30% depth)</div>
        <div class="value" id="askVolume">—</div>
      </div>
    </div>
    <div class="table" style="margin-top: 0;">
      <div class="metric diff">
        <div class="label">Imbalance (Bid - Ask)</div>
        <div class="value" id="imbalance">—</div>
      </div>
      <div class="metric" style="visibility: hidden;"></div>
    </div>

    <div class="status" id="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Подключение...</span>
    </div>
    <div id="errorMsg" class="error"></div>
  </div>

  <script>
    (function() {
      // ---------- НАСТРОЙКИ (можно менять) ----------
      const SYMBOL = 'btcusdt';                  // торговая пара (нижний регистр)
      const DEPTH_PERCENT = 30;                 // глубина в процентах от цены
      const STREAM_URL = `wss://stream.binance.com:9443/ws/${SYMBOL}@depth@1000ms`;
      // ---------------------------------------------

      const symbolDisplay = document.getElementById('symbolDisplay');
      const bidVolumeEl = document.getElementById('bidVolume');
      const askVolumeEl = document.getElementById('askVolume');
      const imbalanceEl = document.getElementById('imbalance');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const errorMsg = document.getElementById('errorMsg');

      symbolDisplay.textContent = SYMBOL.toUpperCase();

      function formatVolume(vol) {
        if (vol === null || vol === undefined) return '—';
        if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
        if (vol >= 1e3) return (vol / 1e3).toFixed(2) + 'K';
        return vol.toFixed(2);
      }

      function setConnected(connected) {
        if (connected) {
          statusDot.className = 'dot';
          statusText.textContent = 'Live';
        } else {
          statusDot.className = 'dot disconnected';
          statusText.textContent = 'Отключено';
        }
      }

      function showError(text) {
        errorMsg.textContent = text || '';
      }

      // Главная функция обработки данных стакана
      function processOrderBook(data) {
        try {
          const bids = data.bids || [];
          const asks = data.asks || [];

          if (bids.length === 0 || asks.length === 0) {
            showError('Пустой стакан');
            return;
          }

          // Лучшие цены
          const bestBid = parseFloat(bids[0][0]);
          const bestAsk = parseFloat(asks[0][0]);

          // Границы для 30% глубины
          const bidThreshold = bestBid * (1 - DEPTH_PERCENT / 100); // ниже bestBid
          const askThreshold = bestAsk * (1 + DEPTH_PERCENT / 100); // выше bestAsk

          // Суммируем объёмы bid в диапазоне [bidThreshold, bestBid]
          let bidVolume = 0;
          for (const [price, qty] of bids) {
            const p = parseFloat(price);
            if (p >= bidThreshold && p <= bestBid) {
              bidVolume += parseFloat(qty);
            } else if (p < bidThreshold) {
              break; // дальше цены ещё ниже, не входят
            }
          }

          // Суммируем объёмы ask в диапазоне [bestAsk, askThreshold]
          let askVolume = 0;
          for (const [price, qty] of asks) {
            const p = parseFloat(price);
            if (p >= bestAsk && p <= askThreshold) {
              askVolume += parseFloat(qty);
            } else if (p > askThreshold) {
              break; // дальше цены выше, не входят
            }
          }

          // Обновляем интерфейс
          bidVolumeEl.textContent = formatVolume(bidVolume);
          askVolumeEl.textContent = formatVolume(askVolume);
          const imbalance = bidVolume - askVolume;
          imbalanceEl.textContent = formatVolume(imbalance);
          // Можно окрасить imbalance: если положительный — зелёный, отрицательный — красный
          if (imbalance > 0) {
            imbalanceEl.style.color = '#2ebd85';
          } else if (imbalance < 0) {
            imbalanceEl.style.color = '#f6465d';
          } else {
            imbalanceEl.style.color = '#eaecef';
          }

          showError('');
          setConnected(true);
        } catch (e) {
          showError('Ошибка обработки данных');
          console.error(e);
        }
      }

      let ws;
      function connect() {
        if (ws) {
          ws.close();
        }
        setConnected(false);
        showError('');
        ws = new WebSocket(STREAM_URL);

        ws.onopen = () => {
          console.log('WebSocket connected');
          // Данные придут в первом сообщении
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.bids && msg.asks) {
            processOrderBook(msg);
          }
        };

        ws.onerror = (err) => {
          console.error('WebSocket error', err);
          showError('Ошибка соединения');
          setConnected(false);
        };

        ws.onclose = (event) => {
          console.log('WebSocket closed, reconnect in 3s', event.reason);
          setConnected(false);
          ws = null;
          setTimeout(connect, 3000);
        };
      }

      connect();
    })();
  </script>
</body>
</html>
