<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binance Order Book Depth 30%</title>
  <!-- Встроенный favicon, чтобы не было ошибки 404 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📊</text></svg>">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e11;
      color: #eaecef;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: #1e2329;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      color: #f0b90b;
    }
    .symbol {
      font-size: 1.2rem;
      color: #848e9c;
      margin-bottom: 20px;
    }
    .table {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 30px;
      margin-top: 10px;
    }
    .metric {
      text-align: left;
    }
    .metric .label {
      font-size: 0.85rem;
      color: #848e9c;
      margin-bottom: 4px;
    }
    .metric .value {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .bid .value { color: #2ebd85; }
    .ask .value { color: #f6465d; }
    .diff .value { color: #eaecef; }
    .status {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #848e9c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ebd85;
      display: inline-block;
    }
    .dot.disconnected { background: #f6465d; }
    .dot.connecting { background: #f0b90b; }
    .error { color: #f6465d; margin-top: 10px; }
    .debug {
      margin-top: 15px;
      font-size: 0.7rem;
      color: #5e6673;
      background: #14181c;
      padding: 10px;
      border-radius: 6px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Order Book Depth</h1>
    <div class="symbol" id="symbolDisplay">BTCUSDT</div>

    <div class="table">
      <div class="metric bid">
        <div class="label">Bid Volume (30% depth)</div>
        <div class="value" id="bidVolume">—</div>
      </div>
      <div class="metric ask">
        <div class="label">Ask Volume (30% depth)</div>
        <div class="value" id="askVolume">—</div>
      </div>
    </div>
    <div class="table" style="margin-top: 0;">
      <div class="metric diff">
        <div class="label">Imbalance (Bid - Ask)</div>
        <div class="value" id="imbalance">—</div>
      </div>
      <div class="metric" style="visibility: hidden;"></div>
    </div>

    <div class="status" id="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Подключение...</span>
    </div>
    <div id="errorMsg" class="error"></div>
    <div id="debugInfo" class="debug"></div>
  </div>

  <script>
    (function() {
      // ---------- НАСТРОЙКИ ----------
      const SYMBOL = 'btcusdt';                // торговая пара (нижний регистр)
      const DEPTH_PERCENT = 30;                // глубина в процентах от лучшей цены
      // Поток снимков стакана раз в секунду (полные bids/asks)
      const STREAM_URL = `wss://stream.binance.com:443/ws/${SYMBOL}@depth@1000ms`;
      // ------------------------------

      const symbolDisplay = document.getElementById('symbolDisplay');
      const bidVolumeEl = document.getElementById('bidVolume');
      const askVolumeEl = document.getElementById('askVolume');
      const imbalanceEl = document.getElementById('imbalance');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const errorMsg = document.getElementById('errorMsg');
      const debugInfo = document.getElementById('debugInfo');

      symbolDisplay.textContent = SYMBOL.toUpperCase();

      function log(msg) {
        const time = new Date().toLocaleTimeString();
        debugInfo.textContent = `[${time}] ${msg}`;
        console.log(msg);
      }

      function formatVolume(vol) {
        if (vol === null || vol === undefined) return '—';
        if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
        if (vol >= 1e3) return (vol / 1e3).toFixed(2) + 'K';
        return vol.toFixed(2);
      }

      function setStatus(state) {
        statusDot.className = 'dot ' + state; // connecting / disconnected / (empty for connected)
        if (state === 'connecting') {
          statusText.textContent = 'Подключение...';
        } else if (state === 'disconnected') {
          statusText.textContent = 'Отключено';
        } else {
          statusText.textContent = 'Live';
        }
      }

      function showError(text) {
        errorMsg.textContent = text || '';
      }

      // Обработка полного снимка стакана (bids/asks)
      function processOrderBook(data) {
        try {
          if (!data || !data.bids || !data.asks) {
            log('Некорректные данные (ожидались bids/asks): ' + JSON.stringify(data).slice(0, 100));
            return;
          }

          const bids = data.bids;
          const asks = data.asks;

          if (bids.length === 0 || asks.length === 0) {
            showError('Пустой стакан');
            log('Пустой стакан');
            return;
          }

          const bestBid = parseFloat(bids[0][0]);
          const bestAsk = parseFloat(asks[0][0]);

          // Границы диапазона ±30%
          const bidThreshold = bestBid * (1 - DEPTH_PERCENT / 100);
          const askThreshold = bestAsk * (1 + DEPTH_PERCENT / 100);

          let bidVolume = 0;
          for (const [price, qty] of bids) {
            const p = parseFloat(price);
            if (p >= bidThreshold && p <= bestBid) {
              bidVolume += parseFloat(qty);
            } else if (p < bidThreshold) {
              break; // дальше цены ещё ниже, не входят
            }
          }

          let askVolume = 0;
          for (const [price, qty] of asks) {
            const p = parseFloat(price);
            if (p >= bestAsk && p <= askThreshold) {
              askVolume += parseFloat(qty);
            } else if (p > askThreshold) {
              break; // дальше цены выше, не входят
            }
          }

          // Обновляем UI
          bidVolumeEl.textContent = formatVolume(bidVolume);
          askVolumeEl.textContent = formatVolume(askVolume);
          const imbalance = bidVolume - askVolume;
          imbalanceEl.textContent = formatVolume(imbalance);

          if (imbalance > 0) {
            imbalanceEl.style.color = '#2ebd85';
          } else if (imbalance < 0) {
            imbalanceEl.style.color = '#f6465d';
          } else {
            imbalanceEl.style.color = '#eaecef';
          }

          showError('');
          setStatus(''); // connected
          log('Данные обновлены успешно');
        } catch (e) {
          showError('Ошибка обработки данных: ' + e.message);
          log('Ошибка: ' + e.message);
        }
      }

      let ws;
      function connect() {
        if (ws) {
          ws.close();
        }
        setStatus('connecting');
        showError('');
        log('Подключение к ' + STREAM_URL);

        ws = new WebSocket(STREAM_URL);

        ws.onopen = () => {
          log('Соединение установлено, ожидание данных...');
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            processOrderBook(msg);
          } catch (err) {
            log('Ошибка парсинга JSON: ' + err.message);
          }
        };

        ws.onerror = (err) => {
          log('Ошибка WebSocket');
          console.error('WebSocket error', err);
          showError('Ошибка соединения с Binance');
          setStatus('disconnected');
        };

        ws.onclose = (event) => {
          log('Соединение закрыто (код ' + event.code + ', причина: ' + (event.reason || 'нет') + '). Переподключение через 3с...');
          setStatus('disconnected');
          ws = null;
          setTimeout(connect, 3000);
        };
      }

      connect();
    })();
  </script>
</body>
</html>
